name: Nightly Deployment

on:
  schedule:
    - cron: '0 0 * * *' # Run at midnight every day
  workflow_dispatch: # Allow manual trigger

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ref-type
      - name: Build and Compressed Docker Images
        run: |
          docker build -t ref-type-frontend:latest ./frontend
          docker build -t ref-type-backend:latest ./backend
          docker save ref-type-frontend:latest | gzip > frontend.tar.gz
          docker save ref-type-backend:latest | gzip > backend.tar.gz
      - name: Upload Image Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            frontend.tar.gz
            backend.tar.gz
          retention-days: 1

  provision-dynamic-ec2:
    runs-on: ubuntu-latest
    outputs:
      ec2_ip: ${{ steps.provision.outputs.ec2_ip }}
      instance_id: ${{ steps.provision.outputs.instance_id }}
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/provision-ec2.sh
      - name: Provision EC2
        id: provision
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AMI_ID: ${{ secrets.AMI_ID }}
          INSTANCE_TYPE: ${{ secrets.INSTANCE_TYPE }}
          KEY_NAME: ${{ secrets.KEY_NAME }}
          SECURITY_GROUP_ID: ${{ secrets.SECURITY_GROUP_ID }}
          SUBNET_ID: ${{ secrets.SUBNET_ID }}
        run: |
          chmod +x scripts/provision-ec2.sh
          ./scripts/provision-ec2.sh

  smoke-test:
    needs: [build-images, provision-dynamic-ec2]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo (for Docker compose file)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ref-type
          sparse-checkout: |
            compose.yaml
            init.sql
          path: source
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/smoke-test.sh
          path: infra
      - name: Download Image Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
      - name: Run Smoke Test
        env:
          EC2_IP: ${{ needs.provision-dynamic-ec2.outputs.ec2_ip }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          cp source/compose.yaml .
          cp source/init.sql .
          chmod +x ./infra/scripts/smoke-test.sh
          ./infra/scripts/smoke-test.sh

  push-to-ecr:
    needs: smoke-test
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Download Image Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
      - name: Load Images
        run: |
          docker load -i frontend.tar.gz
          docker load -i backend.tar.gz
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Tag and Push Images
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker tag ref-type-frontend:latest $REGISTRY/ref-type-frontend:latest
          docker tag ref-type-backend:latest $REGISTRY/ref-type-backend:latest
          docker push $REGISTRY/ref-type-frontend:latest
          docker push $REGISTRY/ref-type-backend:latest

  deploy-to-qa:
    needs: push-to-ecr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo (for Docker compose file)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ref-type
          sparse-checkout: |
            compose.yaml
            init.sql
          path: source
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/deploy-qa.sh
          path: infra
      - name: Deploy to QA EC2
        env:
          QA_EC2_IP: ${{ secrets.QA_EC2_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REGISTRY: ${{ needs.push-to-ecr.outputs.registry }}
        run: |
          cp source/compose.yaml .
          cp source/init.sql .
          chmod +x ./infra/scripts/deploy-qa.sh
          ./infra/scripts/deploy-qa.sh

  cleanup:
    needs: [provision-dynamic-ec2, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
            sparse-checkout: scripts/cleanup-ec2.sh
      - name: Cleanup Dynamic EC2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          INSTANCE_ID: ${{ needs.provision-dynamic-ec2.outputs.instance_id }}
        run: |
          if [ -n "$INSTANCE_ID" ]; then
            chmod +x scripts/cleanup-ec2.sh
            ./scripts/cleanup-ec2.sh
          else
            echo "No Instance ID found, skipping cleanup."
          fi
